name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        working-directory: Frontend
        run: npm ci

      - name: Build
        working-directory: Frontend
        env:
          VITE_EJS_SERVICE: ${{ secrets.VITE_EJS_SERVICE }}
          VITE_EJS_CONTACT: ${{ secrets.VITE_EJS_CONTACT }}
          VITE_EJS_AUTOREPLY: ${{ secrets.VITE_EJS_AUTOREPLY }}
          VITE_EJS_KEY: ${{ secrets.VITE_EJS_KEY }}
        run: npm run build

      - name: Deploy to public_html via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./Frontend/dist/
          server-dir: ./
          # dangerous-clean-slate is intentionally NOT used: it wipes
          # server-dir entirely, ignoring `exclude`, which would delete
          # .well-known/ and cgi-bin/. Default (non-dangerous) mode still
          # removes stale files via its own state file, it just never
          # touches paths outside what it deployed/excluded.
          exclude: |
            **/.well-known/**
            **/cgi-bin/**
